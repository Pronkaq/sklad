<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход — Учёт поддонов</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f4f6f8;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }
        .box {
            width: min(420px, calc(100vw - 30px));
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,.06);
        }
        h1 { margin-top: 0; }
        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            color: #6b7280;
            font-size: 13px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .hint {
            margin-top: 16px;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.45;
        }
        code {
            background: #f3f4f6;
            padding: 2px 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>Вход</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Логин</label>
        <input name="username" autocomplete="username" autofocus required>

        <label>Пароль</label>
        <input name="password" type="password" autocomplete="current-password" required>

        <button>Войти</button>
    </form>

    <div class="hint">Обратитесь к администратору для получения учётной записи.</div>
</div>
</body>
</html>
