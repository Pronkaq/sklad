{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>{% if edit_pallet %}Редактировать этикетку поддона {{ edit_pallet.id }}{% else %}Создать этикетку передачи в цех 5{% endif %}</h1>
    <form method="post" {% if edit_pallet %}action="{{ url_for('edit_shop10_pallet_label', pallet_id=edit_pallet.id) }}"{% endif %}>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grid">
            <div>
                <label>Цех-источник</label>
                {% if user and user.role == "source_user" %}
                    <input value="{{ LOCATIONS.get(user.shop, user.shop) }}" disabled>
                    <input type="hidden" name="source_shop" value="{{ (edit_pallet.source_shop if edit_pallet else user.shop) }}">
                {% else %}
                    <select name="source_shop" required>
                        <option value="SHOP10">Цех 10</option>
                        <option value="SHOP3">Цех 3</option>
                        <option value="NOVGOROD">Новгород</option>
                    </select>
                {% endif %}
            </div>
            <div>
                <label>Тип продукции</label>
                <select name="item_category" required>
                    {% for code, label in ITEM_CATEGORIES %}
                        <option value="{{ code }}" {% if edit_pallet and code == edit_pallet.item_category %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Ассортимент</label>
                <select name="assortment" required>
                    {% for a in db_assortments %}
                        <option value="{{ a.name }}" {% if edit_pallet and a.name == edit_pallet.assortment %}selected{% endif %}>{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Номер партии</label>
                <input name="party_number" placeholder="Например: партия / заказ / смена" value="{{ edit_pallet.party_number if edit_pallet else "" }}">
            </div>
            <div>
                <label>Количество рулонов</label>
                <input name="rolls_count" type="number" min="0" required value="{{ edit_pallet.rolls_count if edit_pallet else "" }}">
            </div>
            <div>
                <label>Общий метраж</label>
                <input name="meters_total" type="number" step="0.01" min="0" required value="{{ edit_pallet.meters_total if edit_pallet else "" }}">
            </div>
            <div>
                <label>Дата наработки</label>
                <input name="production_date" type="date" value="{{ edit_pallet.production_date if edit_pallet else "" }}">
            </div>
            <div>
                <label>Ответственный</label>
                <input name="responsible" placeholder="ФИО" value="{{ current_user.display_name if current_user else '' }}">
            </div>
        </div>
        <p>
            <label>Комментарий</label>
            <textarea name="comment">{{ edit_pallet.comment if edit_pallet else "" }}</textarea>
        </p>
        <button type="submit">{% if edit_pallet %}Сохранить изменения{% else %}Создать этикетку{% endif %}</button>
    {% if edit_pallet %}<a class="btn secondary" href="{{ url_for('pallet_detail', pallet_id=edit_pallet.id) }}">Отмена</a>{% endif %}
    </form>
</div>
{% endblock %}
